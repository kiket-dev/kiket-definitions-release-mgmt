model_version: "1.0"
project:
  key: RELEASE
  name: Release Management
  version: 1.0.0
  description: Production release workflow with approval chains, rollback capabilities, and deployment tracking.

  team:
    roles:
      - name: release_manager
        description: Release manager coordinating deployments and approvals
      - name: qa_lead
        description: QA lead verifying staging deployments
      - name: sre
        description: Site reliability engineer managing production infrastructure
      - name: engineering_lead
        description: Engineering lead providing technical sign-off

  extensions:
    required:
      - github
    optional:
      - slack
      - pagerduty

  seed_data:
    issues:
      - title: "Release v2.5.0 - custom dashboards and bulk operations"
        description: Major release including the custom dashboard builder, bulk card operations, and 14 bug fixes. Requires director approval due to database migration.
        case_type: Release
        status: pending_approval
        priority: high
        labels:
          - major
          - q3

      - title: "Hotfix v2.4.3 - fix webhook delivery timeout"
        description: Critical hotfix for webhook deliveries timing out after 5 seconds. Increases timeout to 30 seconds and adds retry logic. Related to incident INC-847.
        case_type: Hotfix
        status: production
        priority: critical
        labels:
          - hotfix
          - webhooks

      - title: "Release v2.6.0 - API rate limiting and SSO"
        description: Includes per-tenant API rate limiting middleware, SAML 2.0 SSO integration, and OpenTelemetry collector migration.
        case_type: Release
        status: development
        priority: high
        labels:
          - minor
          - security

      - title: "Feature flag rollout - new command palette"
        description: Gradually roll out the redesigned command palette. Start with internal users, then beta, then 25% of all users over two weeks.
        case_type: FeatureFlag
        status: staging
        priority: medium
        labels:
          - gradual-rollout
          - ux

      - title: "Change request - PostgreSQL connection pool resize"
        description: Increase connection pool from 25 to 50 per instance to address peak-hour saturation. Requires config change across all Cloud Run services.
        case_type: ChangeRequest
        status: pending_approval
        priority: high
        labels:
          - infrastructure
          - database

      - title: "Postmortem - v2.4.1 rollback due to migration lock"
        description: v2.4.1 was rolled back after a long-running migration locked the issues table for 12 minutes during peak hours. Document root cause and preventive measures.
        case_type: Postmortem
        status: completed
        priority: medium
        labels:
          - postmortem
          - database
